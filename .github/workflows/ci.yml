name: Pipeline CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configurando Node
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Instalando dependências
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        # configuração do e-mail em caso de erro
      - name: Enviar e-mail em caso de falha
        if: failure() # Garante o envio apenas se o pipeline der erro
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Alerta: Falha no Pipeline de ${{ github.actor }}"
          body: "O pipeline falhou! Verifique os logs no repositório."
          to: feiasimburranao@gmail.com